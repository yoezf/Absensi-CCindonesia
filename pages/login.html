<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="csrf-token" content="ImFkNGY0ODMxM2ViMmJhM2EzZjk2ZGRhMWNmNjhjMjU5YTBiODE4NGUi.ahPTUQ.-TZUXea8yRsLT5qW4c34OaWFhWI">
    <meta name="theme-color" content="#1A4A8C">
    <title>Sign In — Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="/css2" rel="stylesheet">
    
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/login.css">
  </head>
  <body class="role-guest">
    <div class="login-wrap">
      
      <div class="login-lang-switcher">
        <a href="../pages/id.html" class="lang-btn" title="Bahasa Indonesia">ID</a>
        <a href="../pages/en.html" class="lang-btn active" title="English (US)">EN</a>
        <a href="../pages/zh.html" class="lang-btn" title="中文">中</a>
      </div>

      <div class="login-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
          <circle cx="12" cy="9" r="2.5" />
        </svg>
        <span>Pico Indonesia</span>
      </div>

      <div class="login-card card">
        <div class="login-card-head">
          <h1 class="login-title">Welcome back</h1>
          <p class="login-sub">
            Sign in with the account provided by your manager.
          </p>
        </div>

        <div class="login-alert" id="loginAlert" role="alert" aria-live="polite" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="loginAlertMsg"></span>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-field">
            <label class="form-label" for="email">Email</label>
            <div class="input-wrap">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="3" />
                  <polyline points="2,4 12,13 22,4" />
                </svg>
              </span>
              <input type="email" id="email" name="email" class="form-input" placeholder="name@company.com" autocomplete="email" inputmode="email" required>
            </div>
          </div>

          <div class="form-field">
            <label class="form-label" for="password">Password</label>
            <div class="input-wrap">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="input-toggle-pw" id="togglePw" aria-label="Show password">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="login-row">
            <label class="login-remember">
              <input type="checkbox" name="remember" id="remember">
              <span>Remember me</span>
            </label>
            <a href="../pages/forgot-password.html" class="login-forgot">
              Forgot password?
            </a>
          </div>

          <button type="submit" class="btn btn-primary btn-full login-btn" id="loginBtn">
            <span class="login-btn-text">Clock In</span>
            <span class="login-spinner" aria-hidden="true"></span>
          </button>
        </form>

        <p class="login-help">
          Need help? Contact
          <strong>manajer IT</strong> .
        </p>
      </div>

      <p class="login-footer-note">
        Digital Attendance System — Pico Indonesia © 2026
      </p>
    </div>

    <script>
      const I18N = {
        loginEmailRequired: "Email cannot be empty.",
        loginEmailInvalid: "Invalid email format.",
        loginPasswordRequired: "Password cannot be empty.",
        loginFailed:
          "Incorrect email or password. Please try again.",
        loginConnectionFailed:
          "Unable to connect to server. Check your internet connection.",
        loginHidePassword: "Hide password",
        loginShowPassword: "Show password",
      };
    </script>
    <script src="../scripts/login.js"></script>
  
</body></html>
